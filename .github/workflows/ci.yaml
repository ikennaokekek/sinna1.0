name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Local integration/E2E uses Postgres + Redis service containers (no cloud secrets required for PRs).
# Optional remote smoke: set repository variable ENABLE_REMOTE_E2E=true and add secrets:
#   STAGING_E2E_BASE_URL — e.g. https://your-staging-api.example.com
#   TEST_API_KEY — valid key for that environment (same value can be used as API_KEY)
# Local one-command real job + poll (uses same env names): pnpm smoke:staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Unit tests (API, root Vitest, worker)
        run: pnpm test:unit

  integration-e2e-local:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CI_TEST_API_KEY: sinna-ci-test-api-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379
      PORT: 4000
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret-not-for-production
      # API boots without real cloud keys in NODE_ENV=test
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run DB migrations
        run: pnpm -C apps/api run migrate

      - name: Seed CI tenant and API key
        run: |
          set -euo pipefail
          H=$(printf '%s' "$CI_TEST_API_KEY" | sha256sum | awk '{print $1}')
          TENANT_ID=$(psql "$DATABASE_URL" -Atq -c \
            "insert into tenants(name, active, plan, status) values ('ci', true, 'standard', 'active') returning id;" \
            | tr -d '[:space:]')
          psql "$DATABASE_URL" -c \
            "insert into api_keys(key_hash, tenant_id) values ('$H', '$TENANT_ID');"

      - name: Start API
        run: |
          nohup node apps/api/dist/index.js > api.log 2>&1 &
          echo $! > api.pid
          sleep 2
          if ! ps -p "$(cat api.pid)" > /dev/null 2>&1; then
            echo "API exited during startup"
            cat api.log
            exit 1
          fi

      - name: Wait for API
        run: bash scripts/wait-for-api.sh "http://127.0.0.1:${PORT}" 90

      - name: Start minimal queue workers (BullMQ)
        run: |
          nohup node -e "
            const { Worker } = require('bullmq');
            const IORedis = require('ioredis');
            const c = new IORedis(process.env.REDIS_URL);
            const mk = (q) => new Worker(q, async () => ({ ok: true }), { connection: c });
            mk('captions'); mk('ad'); mk('color'); mk('video-transform');
            setInterval(() => {}, 1 << 30);
          " > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Vitest integration smoke (live HTTP)
        env:
          E2E_BASE_URL: http://127.0.0.1:4000
          API_BASE_URL: http://127.0.0.1:4000
          TEST_API_KEY: ${{ env.CI_TEST_API_KEY }}
          API_KEY: ${{ env.CI_TEST_API_KEY }}
        run: pnpm test:integration

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E (health)
        env:
          E2E_BASE_URL: http://127.0.0.1:4000
          API_KEY: ${{ env.CI_TEST_API_KEY }}
        run: pnpm test:e2e

      - name: API package unit tests (with DB)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: pnpm -C apps/api test

      - name: Stop API and workers
        if: always()
        run: |
          for f in api.pid worker.pid; do
            if [ -f "$f" ]; then
              PID=$(cat "$f")
              if kill -0 "$PID" 2>/dev/null; then kill -9 "$PID" || true; fi
            fi
          done
          if [ -f api.log ]; then echo "--- api.log ---"; tail -n 80 api.log; fi

  # Runs only when repo variable ENABLE_REMOTE_E2E is set to the string "true".
  # Configure secrets: STAGING_E2E_BASE_URL, TEST_API_KEY (must match a valid key on that deployment).
  integration-e2e-remote:
    if: vars.ENABLE_REMOTE_E2E == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Require staging secrets
        env:
          STAGING_URL: ${{ secrets.STAGING_E2E_BASE_URL }}
          STAGING_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          if [ -z "$STAGING_URL" ] || [ -z "$STAGING_KEY" ]; then
            echo "ENABLE_REMOTE_E2E is true but STAGING_E2E_BASE_URL or TEST_API_KEY is empty."
            echo "Add both as repository secrets (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Vitest integration smoke (staging)
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_E2E_BASE_URL }}
          API_BASE_URL: ${{ secrets.STAGING_E2E_BASE_URL }}
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          API_KEY: ${{ secrets.TEST_API_KEY }}
        run: pnpm test:integration

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E (staging)
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_E2E_BASE_URL }}
          API_KEY: ${{ secrets.TEST_API_KEY }}
        run: pnpm test:e2e

  deploy-notify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, integration-e2e-local]
    runs-on: ubuntu-latest
    steps:
      - name: Render auto-deploy note
        run: |
          echo "Build and integration-e2e-local passed."
          echo "If this repo is connected to Render, main will deploy automatically."
